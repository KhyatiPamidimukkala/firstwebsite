<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Khyati's Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="page-header">
        <h1>Feedback Form</h1>
        <p>I would love to hear your thoughts and suggestions about my website.</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about(1).html">About</a>
        <a href="contact(1).html">Contact</a>
        <a href="feedback.html">Feedback</a>
    </nav>

    <main class="page-content">
        <div class="card form-card">
            <h2>Send Your Feedback</h2>

            <form>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">

                <label for="message">Your Feedback</label>
                <textarea id="message" name="message" rows="6" placeholder="Write your feedback here..."></textarea>

                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 Khyati's Website. All rights reserved.</p>
    </footer>

</body>
</html>
